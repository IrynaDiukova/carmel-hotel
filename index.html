<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#cfe4f5" />
<title>Стандарты работы · Carmel Hotel</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="icon.svg" />
<style>
  :root{
    --bg-top:#e7f1fb; --bg-bot:#cfe2f3;
    --card:#ffffff;
    --text:#16202b;
    --muted:#5d6b7a;
    --accent:#12a294;
    --accent-dk:#0e857a;
    --line:#e4e9ef;
    --wa-bg:#ece5dd;
    --wa-in:#ffffff;
    --wa-out:#dcf8c6;
    --sms-bg:#eaf3ff; --sms-bd:#cfe2f6; --sms-tx:#1c4e8a;
    --shadow:0 10px 30px rgba(31,72,114,.12);
    --radius:20px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:linear-gradient(180deg,var(--bg-top),var(--bg-bot)) fixed;
    color:var(--text);
    display:flex;flex-direction:column;
    min-height:100vh;min-height:100dvh;
    overscroll-behavior-y:contain;-webkit-font-smoothing:antialiased;
  }

  header{padding:calc(env(safe-area-inset-top) + 14px) 18px 10px;display:flex;flex-direction:column;gap:10px}
  .topline{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .brand{display:flex;align-items:center;gap:9px;min-width:0}
  .brand img{width:30px;height:30px;flex:0 0 auto;border-radius:8px;box-shadow:0 2px 8px rgba(31,72,114,.18)}
  .brand b{font-size:15px;font-weight:700;letter-spacing:.2px;white-space:nowrap;color:#0e3a55}
  .counter{font-size:13px;color:#3f6b8e;font-variant-numeric:tabular-nums;white-space:nowrap}
  .progress{height:6px;border-radius:99px;background:rgba(255,255,255,.55);overflow:hidden}
  .progress > i{display:block;height:100%;width:0;border-radius:99px;background:linear-gradient(90deg,var(--accent),#37c4b4);transition:width .35s cubic-bezier(.2,.8,.2,1)}

  main{flex:1;display:flex;flex-direction:column;padding:10px 16px 4px;overflow-y:auto;overflow-x:hidden;scrollbar-width:thin;scrollbar-color:rgba(31,72,114,.25) transparent}
  main::-webkit-scrollbar{width:6px}
  main::-webkit-scrollbar-thumb{background:rgba(31,72,114,.22);border-radius:99px}
  .stage{width:100%;max-width:560px;margin:auto;display:flex}

  .card{
    width:100%;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
    padding:20px 18px;border:1px solid #fff;
    display:flex;flex-direction:column;gap:14px;
    animation:cardIn .3s cubic-bezier(.2,.8,.2,1);
  }
  .card.back{animation:cardInBack .3s cubic-bezier(.2,.8,.2,1)}
  .card.center{text-align:center;align-items:center}
  @keyframes cardIn{from{opacity:0;transform:translateX(26px)}to{opacity:1;transform:none}}
  @keyframes cardInBack{from{opacity:0;transform:translateX(-26px)}to{opacity:1;transform:none}}

  .card-head{display:flex;align-items:center;gap:12px}
  .emoji{width:46px;height:46px;flex:0 0 auto;border-radius:13px;background:rgba(18,162,148,.10);border:1px solid rgba(18,162,148,.25);display:grid;place-items:center;font-size:24px}
  .card-head .meta{min-width:0}
  .eyebrow{font-size:11px;font-weight:700;color:var(--accent-dk);text-transform:uppercase;letter-spacing:.8px}
  .scr-title{font-size:19px;font-weight:800;line-height:1.25;margin-top:2px}
  .card-body{display:flex;flex-direction:column;gap:13px}

  /* блоки */
  .blk-h{font-size:15.5px;font-weight:800;color:var(--accent-dk);margin-top:2px}
  .blk-p{margin:0;font-size:15.5px;line-height:1.55}
  .blk-p b,.expl b,.box b,.blk-list b{font-weight:800}
  .blk-list{margin:0;padding-left:0;list-style:none;display:flex;flex-direction:column;gap:8px}
  .blk-list li{position:relative;padding-left:24px;font-size:15px;line-height:1.5}
  .blk-list li::before{content:"";position:absolute;left:7px;top:9px;width:7px;height:7px;border-radius:99px;background:var(--accent)}
  ol.blk-list{counter-reset:n}
  ol.blk-list li{padding-left:34px}
  ol.blk-list li::before{counter-increment:n;content:counter(n);top:0;left:0;width:24px;height:24px;border-radius:8px;background:var(--accent);color:#fff;font-size:13px;font-weight:800;display:grid;place-items:center}

  .expl{font-style:italic;color:#374550;font-size:15px;line-height:1.55;border-left:3px solid var(--accent);padding:2px 0 2px 12px}

  /* welcome / финал */
  .logo-img{width:160px;height:160px;max-width:62%;border-radius:24px;border:1px solid var(--line);box-shadow:0 8px 22px rgba(31,72,114,.14)}
  .blk-hero{font-size:21px;font-weight:800;line-height:1.3;color:#0e3a55}
  .blk-sub{font-size:15px;color:var(--muted);line-height:1.5}

  /* WhatsApp окно */
  .wa{border-radius:14px;overflow:hidden;border:1px solid var(--line);box-shadow:0 4px 14px rgba(31,72,114,.08)}
  .wa-head{background:var(--accent);color:#fff;font-size:12px;font-weight:700;letter-spacing:.3px;padding:8px 13px;display:flex;align-items:center;gap:7px}
  .wa-head::before{content:"";width:7px;height:7px;border-radius:99px;background:#bff3ea}
  .wa-body{background:var(--wa-bg);padding:12px 11px;display:flex;flex-direction:column;gap:10px}
  .wa-msg{max-width:86%;padding:8px 11px 7px;border-radius:9px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:14.5px;line-height:1.45;position:relative;box-shadow:0 1px 1px rgba(0,0,0,.12)}
  .wa-msg.in{background:var(--wa-in);align-self:flex-start;border-top-left-radius:2px}
  .wa-msg.out{background:var(--wa-out);align-self:flex-end;border-top-right-radius:2px}
  .wa-msg.react{margin-bottom:8px}
  .wa-react{position:absolute;bottom:-11px;right:8px;background:#fff;border-radius:99px;padding:1px 5px;font-size:12px;box-shadow:0 1px 4px rgba(0,0,0,.2)}

  /* SMS окно */
  .sms{display:flex;flex-direction:column;gap:5px}
  .sms-label{font-size:12px;font-weight:600;color:var(--muted)}
  .sms-bubble{align-self:flex-start;background:var(--sms-bg);border:1px solid var(--sms-bd);color:var(--sms-tx);border-radius:14px 14px 14px 4px;padding:9px 14px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:15.5px;font-weight:600}

  /* коды от номеров */
  .pins{background:#f6f8fb;border:1px solid var(--line);border-radius:12px;padding:11px 14px;display:flex;flex-direction:column;gap:3px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:13px;line-height:1.5;max-width:78%}
  .pin-line{display:flex;gap:10px}
  .pin-line .r{min-width:4ch;font-weight:700}
  .pin-line .c{color:var(--accent-dk);font-weight:600}

  /* цветные рамки */
  .box{border-radius:14px;padding:13px 15px;display:flex;flex-direction:column;gap:9px;border:1.5px solid}
  .box-t{font-weight:800;font-size:15px}
  .box.info{border-color:rgba(18,162,148,.5);background:rgba(18,162,148,.08)}
  .box.info .box-t{color:var(--accent-dk)}
  .box.warn{border-color:#e3a008;background:rgba(227,160,8,.10)}
  .box.warn .box-t{color:#9a6a00}
  .box.danger{border-color:#dc2626;background:rgba(220,38,38,.08)}
  .box.danger .box-t{color:#b91c1c}
  .box .blk-p{font-size:15px}

  /* чек-лист */
  .check{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:7px}
  .check li{position:relative;padding-left:26px;font-size:14.5px;line-height:1.45}
  .check li::before{content:"✅";position:absolute;left:0;top:0;font-size:14px}

  /* навигация */
  footer{padding:10px 16px calc(env(safe-area-inset-bottom) + 14px);display:flex;flex-direction:column;gap:10px;max-width:592px;width:100%;margin:0 auto}
  .nav{display:flex;gap:10px}
  button{font-family:inherit;font-size:16px;font-weight:700;border:none;border-radius:14px;cursor:pointer;padding:15px 16px;transition:transform .08s ease,opacity .15s,background .15s;display:flex;align-items:center;justify-content:center;gap:7px}
  button:active{transform:scale(.97)}
  button:disabled{opacity:.4;cursor:default}
  .btn-back{background:#fff;color:var(--text);border:1.5px solid var(--line);flex:0 0 auto;min-width:130px;box-shadow:0 3px 10px rgba(31,72,114,.07)}
  .btn-next{background:var(--accent);color:#fff;flex:1;box-shadow:0 6px 18px rgba(18,162,148,.3)}
  .hint{text-align:center;font-size:12px;color:#3f6b8e}

  @media (max-width:360px){ .scr-title{font-size:17px} .btn-back{min-width:96px;padding:15px 10px} }
</style>
</head>
<body>
  <header>
    <div class="topline">
      <div class="brand"><img src="icon.svg" alt="Carmel Hotel"><b>Отель Кармель</b></div>
      <span class="counter" id="counter"></span>
    </div>
    <div class="progress"><i id="bar"></i></div>
  </header>
  <main><div class="stage" id="stage"></div></main>
  <footer id="footer"></footer>

<script>
/* ===================== ДАННЫЕ ===================== */
const SCREENS = [
  { center:true, blocks:[
    { logo:true },
    { hero:"Стандарты работы сотрудников отеля Кармель" },
    { sub:"Этот сайт научит тебя основам рабочих заданий в отеле." }

  { sec:"Склад", icon:"👛", title:"Кошелёк со склада", blocks:[

  { sec:"Коды номеров", icon:"🔑", title:"Коды для открытия номеров", blocks:[

      ["1512","3434"],["1402","2344"],["1320","2133"],["1302","4421"],["1206","3143"],
      ["1112","4234"],["1111","3232"],["1110","3422"],["1109","3411"],["820","3111"],

    ]}
  ]},

  { sec:"Правила", icon:"⭐", title:"Три главных правила", blocks:[
    { p:"В отеле существует 3 главных правила, расположенных в порядке важности:" },
    { list:[
      "Нельзя, чтобы люди долго стояли внизу",
      "Нужно, чтобы комната была максимально чистой",
      "Нужно навести чистоту в комнате за 30–45 мин"

  { sec:"Правила", icon:"📞", title:"Сомневаешься — звони менеджеру", blocks:[
    { h:"Второй важный момент" },
    { p:"Если ты не понимаешь, что надо делать, или сомневаешься — позвони менеджеру (минаэлю)." },
    { h:"Кроме этого" },
    { p:"Мы всегда делаем именно то, что написано в задании. Если ты не можешь это сделать по какой-то причине — нужно звонить менеджеру (минаэлю)." }

  { sec:"Задания", icon:"💬", title:"Задания в WhatsApp", blocks:[

  { sec:"Заселение", icon:"🛎️", title:"Заселение: встреча в лобби", blocks:[

    { expl:"Спустись в «ноль», т.е. в лобби, встреть людей и отведи их в комнату 1614. Забери у них 150 шекелей и 100 шекелей залога, отдай чип от лифта и скажи код от двери номера." }
  ]},

  { sec:"Заселение", icon:"🛗", title:"Заселение: отправить на этаж", blocks:[

  ]},

  { sec:"Заселение", icon:"🔢", title:"Первая цифра в сообщении", blocks:[
    { box:"info", blocks:[
      { p:"Обращай внимание на *первую цифру* в сообщении. Например, если указано «18 1811» — спускаться в лобби не нужно: поднимись на 18 этаж, а гости самостоятельно поднимутся к номеру." }

  { sec:"Важно", icon:"⚠️", title:"Ограничения при заселении", blocks:[

  ]},

  { sec:"Задания", icon:"🎟️", title:"Взять чипы у Ли", blocks:[

  { sec:"Задания", icon:"💵", title:"Забрать чип, вернуть залог", blocks:[

    { p:"Например, гость хочет ещё полотенца, туалетную бумагу, штопор и т.д. — скажи, чтобы он звонил менеджеру. Только после того, как менеджер напишет, что именно и сколько — ты принесёшь в конкретный номер." },
    { wa:[ {in:"1112 aday 2 pltnsa"}, {out:"1112 aday 2 pltnsa"} ] }

  { sec:"Подготовка номера", icon:"🧴", title:"Подготовка номера (1/4)", blocks:[

    { p:"Убедись, что в номере есть:" },
    { list:["2 одинаковых бокала","1 бутылка воды","фруктовая тарелка из 5 фруктов","пепельница (1 или 2 — в зависимости от номера)"] },
    { p:"Фрукты должны быть разными (например, 3 яблока и 2 других фрукта). Яблоки — разного цвета (красное, зелёное, жёлтое)." },
    { h:"2. Ванная комната" },

    { p:"Дозаторы: во всех должно быть мыло, уровень не менее 20%, мыло — непосредственно в дозаторе." }
  ]},

  { sec:"Подготовка номера", icon:"☕", title:"Подготовка номера (2/4)", blocks:[
    { h:"3. Чайно-кофейный набор" },
    { list:["сахар","кофе","чай (до 10 пакетиков)","2 одинаковых чашки","2 бисквита: 1 круглый и 1 плоский"] },
    { p:"⚠️ Чашки должны быть одинаковыми. Лишнюю посуду, оставленную гостями, отнеси на склад." },
    { h:"4. Холодильник" },
    { p:"В холодильнике не должно быть продуктов гостей. Лёд из магазина тоже выброси. Холодильник чистый внутри и снаружи. Если в морозилке много льда — сообщи менеджеру." },
    { h:"5. Мусорные корзины" },
    { p:"Все корзины пустые. После уборки установи чистые мусорные пакеты." }
  ]},

  { sec:"Подготовка номера", icon:"✨", title:"Подготовка номера (3/4)", blocks:[
    { h:"6. Чистота поверхностей" },
    { p:"Чистые: зеркала, стеклянные поверхности, окна, стол, тумбочки — без разводов, пыли и загрязнений. Тумбочки и шкафы внутри — пустые." },
    { h:"7. Пол" },
    { p:"Пол чистый: без волос, пыли и мусора в углах, под мебелью и в труднодоступных местах." },
    { h:"8. Постельное бельё" },
    { p:"Проверь бельё со склада. Не используй, если есть пятна, разрывы или другие повреждения — верни на склад и замени." },
    { h:"9. Подушки и одеяла" },
    { p:"Замени на чистые и сухие, если они грязные, влажные или с запахом. Если бельё испачкано красным вином или кровью — обязательно сообщи менеджеру." }
  ]},

  { sec:"Подготовка номера", icon:"📸", title:"Подготовка номера (4/4)", blocks:[
    { h:"10. Вещи гостей" },
    { p:"Если гости что-то оставили: сфотографируй, отправь менеджеру с номером комнаты, отнеси на склад." },
    { h:"11. Повреждения и неисправности" },
    { p:"Повреждения мебели/стен, неисправности техники/сантехники: сфотографируй, укажи номер комнаты, отправь менеджеру." },
    { h:"12. Насекомые" },
    { p:"Если в номере таракан — сообщи менеджеру." },
    { box:"info", title:"Финальная проверка", blocks:[ { check:[
      "номер укомплектован",
      "холодильник чистый и пустой",
      "мусор вынесен",
      "зеркала, окна и стекло чистые",
      "столы и тумбочки чистые и пустые",
      "пол чистый, без волос и мусора",
      "бельё, подушки и одеяла чистые и целые",
      "все предметы на своих местах",
      "номер готов к заселению гостя"
    ]} ]}
  ]},

  { sec:"Уборка", icon:"🧺", title:"Лишнее бельё", blocks:[
    { p:"Если при уборке нашли больше белья, чем минимум, или открыт диван — лишнее отнеси на склад и напиши менеджеру с количеством белья и номером комнаты." },
    { wa:[ {out:"1512 2 odeyala, 4 podushki, 5 polotenec"} ], head:"Например" }
  ]},

  { sec:"Конец смены", icon:"🌙", title:"Домыть и закончить смену", blocks:[
    { wa:[ {in:"1614 patom zaconchili"}, {out:"ok"} ] },
    { expl:"Помой 1614, затем конец смены." }
  ]},

  { sec:"Конец смены", icon:"🏁", title:"Конец смены", blocks:[
    { wa:[ {in:"zaconchili"}, {out:"ok"} ] },
    { expl:"Рабочая смена закончилась." }
  ]},

  { sec:"Конец смены", icon:"🧾", title:"Сдать кошелёк и отчитаться", blocks:[
    { p:"После сообщения менеджера об окончании смены посчитай деньги и чипы в кошельке, положи кошелёк в шкаф и напиши об этом менеджеру." },
    { wa:[ {out:"closet wallet\n5300+5cp"} ], head:"Например" },
    { p:"После этого отправь менеджеру SMS со своим кодом из начала смены и временем окончания смены." },
    { sms:"789, 21.48" }
  ]},

  { sec:"Склад", icon:"📦", title:"Контроль расходных материалов", blocks:[
    { p:"Чтобы качественно работать, вовремя сообщай о нехватке материалов." },
    { p:"Если на складе заканчиваются или отсутствуют: моющие средства, уборочный инвентарь, туалетная бумага, бисквиты, вода или другие материалы — незамедлительно сообщи менеджеру." },
    { p:"После этого менеджер организует пополнение, и к следующему посещению склада всё необходимое будет в наличии. Своевременная информация помогает поддерживать высокий стандарт качества." }
  ]},
];

const TOTAL = SCREENS.length;
const FINAL = SCREENS.length;
const LS_POS = "carmel.onb.pos";

/* ===================== СОСТОЯНИЕ ===================== */
let tg = null, tgV61 = false;
let idx = clampIdx(parseInt(localStorage.getItem(LS_POS) || "0", 10));
let lastDir = 1;

const stage   = document.getElementById("stage");
const mainEl  = document.querySelector("main");
const footer  = document.getElementById("footer");
const bar     = document.getElementById("bar");
const counter = document.getElementById("counter");

/* ===================== УТИЛИТЫ ===================== */
function clampIdx(n){ return Math.max(0, Math.min(FINAL, isNaN(n)?0:n)); }
function save(){ localStorage.setItem(LS_POS, String(idx)); }
function esc(s){ return String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function nl(s){ return esc(s).replace(/\n/g,"<br>"); }
function fmt(s){ return esc(s).replace(/\n/g,"<br>").replace(/\*([^*]+)\*/g,"<b>$1</b>"); }
function haptic(t){ try{ if(tgV61 && tg.HapticFeedback) tg.HapticFeedback.impactOccurred(t); }catch{} }

/* ===================== РЕНДЕР БЛОКОВ ===================== */
function waMsg(m){
  const dir  = m.in != null ? "in" : "out";
  const text = m.in != null ? m.in : m.out;
  const rc   = m.react ? " react" : "";
  const badge= m.react ? `<span class="wa-react">👍</span>` : "";
  return `<div class="wa-msg ${dir}${rc}">${nl(text)}${badge}</div>`;
}
function waHtml(msgs, head){
  return `<div class="wa"><div class="wa-head">${esc(head || "Описание заданий")}</div>` +
         `<div class="wa-body">${msgs.map(waMsg).join("")}</div></div>`;
}
function pinsHtml(rows){
  return `<div class="pins">` + rows.map(([r,c]) =>
    `<span class="pin-line"><span class="r">${esc(r)}</span><span class="c">${esc(c)}</span></span>`).join("") + `</div>`;
}
function renderBlocks(blocks){
  return (blocks || []).map(b => {
    if(b.logo)         return `<img class="logo-img" src="carmel-logo.svg" alt="Carmel Hotel — מלון כרמל">`;
    if(b.hero != null) return `<div class="blk-hero">${fmt(b.hero)}</div>`;
    if(b.sub != null)  return `<div class="blk-sub">${fmt(b.sub)}</div>`;
    if(b.h != null)    return `<div class="blk-h">${esc(b.h)}</div>`;
    if(b.p != null)    return `<p class="blk-p">${fmt(b.p)}</p>`;
    if(b.list)         return `<${b.ordered?"ol":"ul"} class="blk-list">${b.list.map(i=>`<li>${fmt(i)}</li>`).join("")}</${b.ordered?"ol":"ul"}>`;
    if(b.wa)           return waHtml(b.wa, b.head);
    if(b.sms != null)  return `<div class="sms"><div class="sms-label">${esc(b.smsLabel || "Пример SMS менеджеру")}</div><div class="sms-bubble">${nl(b.sms)}</div></div>`;
    if(b.expl != null) return `<div class="expl">${fmt(b.expl)}</div>`;
    if(b.pins)         return pinsHtml(b.pins);
    if(b.check)        return `<ul class="check">${b.check.map(i=>`<li>${fmt(i)}</li>`).join("")}</ul>`;
    if(b.box)          return `<div class="box ${b.box}">${b.title?`<div class="box-t">${esc(b.title)}</div>`:""}${renderBlocks(b.blocks)}</div>`;
    return "";
  }).join("");
}

/* ===================== РЕНДЕР ЭКРАНА ===================== */
function render(){
  if(idx >= FINAL) return renderFinal();
  const s = SCREENS[idx];
  const dirClass = lastDir < 0 ? " back" : "";
  const head = s.center ? "" : `
      <div class="card-head">
        <div class="emoji">${s.icon || "📄"}</div>
        <div class="meta">
          <div class="eyebrow">${esc(s.sec || "")}</div>
          <div class="scr-title">${esc(s.title || "")}</div>
        </div>
      </div>`;

  stage.innerHTML = `
    <div class="card${s.center?" center":""}${dirClass}">
      ${head}
      <div class="card-body">${renderBlocks(s.blocks)}</div>
    </div>`;

  footer.innerHTML = `
    <div class="nav">
      <button class="btn-back" id="prev" ${idx===0?"disabled":""}>‹ Назад</button>
      <button class="btn-next" id="next">Далее ›</button>
    </div>
    <div class="hint">Свайп ← → или стрелки на клавиатуре</div>`;

  document.getElementById("prev").onclick = prev;
  document.getElementById("next").onclick = next;
  updateChrome(); syncTelegram();
}

function renderFinal(){
  stage.innerHTML = `
    <div class="card center" id="card">
      <img class="logo-img" src="carmel-logo.svg" alt="Carmel Hotel">
      <div class="blk-hero">Заключение</div>
      <p class="blk-p" style="text-align:center">На этом инструкция завершена. Надеемся, она поможет тебе быстрее освоиться и чувствовать себя уверенно в любой рабочей ситуации.</p>
      <p class="blk-p" style="text-align:center">Если возникнут вопросы, сомнения или нестандартные ситуации — всегда обращайся к менеджеру, мы обязательно поможем.</p>
      <p class="blk-p" style="text-align:center">Желаем лёгких смен, хорошего настроения, приятной работы и благодарных гостей!</p>
      <p class="blk-sub" style="text-align:center">С уважением,<br>коллектив отеля «Кармель» 🌷</p>
    </div>`;
  footer.innerHTML = `
    <div class="nav">
      <button class="btn-back" id="prev">‹ Назад</button>
      <button class="btn-next" id="restart">⟳ В начало</button>
    </div>`;
  document.getElementById("prev").onclick = prev;
  document.getElementById("restart").onclick = restart;
  updateChrome(); syncTelegram();
}

function updateChrome(){
  counter.textContent = idx >= FINAL ? "Готово" : (idx+1) + " / " + TOTAL;
  bar.style.width = (idx >= FINAL ? 100 : ((idx+1)/TOTAL)*100) + "%";
}

/* ===================== ПЕРЕХОДЫ ===================== */
function go(n, dir){ lastDir = dir; idx = clampIdx(n); save(); render(); mainEl.scrollTop = 0; }
function next(){ haptic("light"); go(idx+1, 1); }
function prev(){ haptic("light"); go(idx-1, -1); }
function restart(){ haptic("light"); go(0, -1); }

window.addEventListener("keydown", e=>{
  if(e.key==="ArrowRight"||e.key==="Enter"){ e.preventDefault(); if(idx<FINAL) next(); else restart(); }
  else if(e.key==="ArrowLeft") prev();
});
let tsx=0, tsy=0, sw=false;
document.addEventListener("touchstart", e=>{ if(e.touches.length!==1) return; tsx=e.touches[0].clientX; tsy=e.touches[0].clientY; sw=true; }, {passive:true});
document.addEventListener("touchend", e=>{
  if(!sw) return; sw=false;
  const dx=e.changedTouches[0].clientX-tsx, dy=e.changedTouches[0].clientY-tsy;
  if(Math.abs(dx)>55 && Math.abs(dx)>Math.abs(dy)*1.4){ if(dx<0) next(); else prev(); }
}, {passive:true});

/* ===================== TELEGRAM ===================== */
function syncTelegram(){
  if(!tg) return;
  try{
    if(tgV61 && tg.BackButton){
      if(idx>0){ tg.BackButton.offClick(prev); tg.BackButton.onClick(prev); tg.BackButton.show(); }
      else tg.BackButton.hide();
    }
    const mb = tg.MainButton; mb.offClick(tgMain);
    mb.setText(idx>=FINAL ? "⟳ В начало" : "Далее ›");
    mb.onClick(tgMain); mb.show();
  }catch(e){}
}
function tgMain(){ if(idx>=FINAL) restart(); else next(); }
function bootTelegram(){
  const w = (window.Telegram && window.Telegram.WebApp) ? window.Telegram.WebApp : null;
  if(!w || !(w.platform && w.platform !== "unknown")) return;
  tg = w; tgV61 = !!(tg.isVersionAtLeast && tg.isVersionAtLeast("6.1"));
  try{ tg.ready(); tg.expand(); }catch(e){}
  syncTelegram();
}
(function(){ const u=(location.hash||"")+" "+(location.search||""); if(!/tgWebApp/i.test(u)) return;
  const s=document.createElement("script"); s.src="https://telegram.org/js/telegram-web-app.js"; s.async=true; s.onload=bootTelegram; document.head.appendChild(s);
})();

/* ===================== SERVICE WORKER ===================== */
if("serviceWorker" in navigator && location.protocol.startsWith("http")){
  window.addEventListener("load", ()=> navigator.serviceWorker.register("sw.js").catch(()=>{}));
}

render();
</script>
</body>
</html>
