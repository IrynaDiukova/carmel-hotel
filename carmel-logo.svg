<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" width="280" height="280" role="img" aria-label="Carmel Hotel — מלון כרמל">
  <defs>
    <linearGradient id="sw" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#37c4b4"/>
      <stop offset="1" stop-color="#149b8e"/>
    </linearGradient>
  </defs>

  <!-- плитка -->
  <rect x="8" y="8" width="264" height="264" rx="46" fill="#ffffff" stroke="#e7e9ec" stroke-width="2"/>

  <!-- свуш (мазок) -->
  <path d="M58,126 C92,109 130,105 160,114 C182,121 198,117 213,101
