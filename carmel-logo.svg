  <!-- מלון כרמל -->
  <text x="140" y="186" text-anchor="middle" direction="rtl"
        font-family="Arial, 'Segoe UI', 'Noto Sans Hebrew', sans-serif"
        font-size="48" font-weight="600" fill="#1aa698" letter-spacing="2">מלון כרמל</text>

  <!-- CARMEL HOTEL -->
  <text x="140" y="222" text-anchor="middle"
        font-family="'Segoe UI', Arial, sans-serif"
